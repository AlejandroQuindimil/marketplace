<div class="catalogo-container">
  <h1>Catálogo</h1>

  <div class="filtros">
    <button
      *ngFor="let cat of categorias"
      [class.active]="categoriaActiva === cat.valor"
      (click)="filtrarPor(cat.valor)">
      {{ cat.label }}
    </button>
  </div>

  <p *ngIf="loading">Cargando productos...</p>

  <div class="grid" *ngIf="!loading">
    <a class="card" *ngFor="let p of productos" [routerLink]="['/productos', p.id]">
      <div class="card-img">
        <button class="fav-btn" (click)="$event.preventDefault()">♡</button>
        <img [src]="p.imagenes[0]" [alt]="p.nombre" onerror="this.style.display='none'">
      </div>
      <div class="card-info">
        <span class="card-marca">{{ p.marca }}</span>
        <span class="card-nombre">{{ p.nombre }}</span>
        <div class="card-precio">
          <span class="precio-actual">{{ p.precio }}€</span>
          <span class="precio-anterior" *ngIf="p.precioAnterior">{{ p.precioAnterior }}€</span>
        </div>
      </div>
    </a>
  </div>

  <p *ngIf="!loading && productos.length === 0" class="empty">No hay productos en esta categoría.</p>
</div>
